    <title>Apex Car Showroom</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .fade-in { animation: fadeIn .2s ease; }
